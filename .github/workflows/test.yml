name: Test
defaults:
  run:
    shell: bash

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-2022
            node_arch: x64
            archflags: ''
            run_tests: true
          - target: linux-x64
            os: ubuntu-22.04
            node_arch: x64
            archflags: ''
            run_tests: true
          - target: linux-arm64
            os: ubuntu-22.04-arm
            node_arch: arm64
            archflags: ''
            run_tests: true
          - target: darwin-x64
            os: macos-15
            node_arch: x64
            archflags: '-arch x86_64'
            run_tests: false
          - target: darwin-arm64
            os: macos-15
            node_arch: arm64
            archflags: '-arch arm64'
            run_tests: true

    runs-on: ${{ matrix.os }}

    steps:

      - name: Fetch Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          architecture: ${{ matrix.node_arch }}
          cache: 'npm'

      - name: Print Native Target
        run: |
          echo "runner=$(uname -s)-$(uname -m)"
          node -p "'node=' + process.version + ' platform=' + process.platform + ' arch=' + process.arch"
          npm config get arch

      - name: Install Modules
        run: npm ci --ignore-scripts

      - name: Build Current Binary
        run: npm run build:rebuild
        env:
          npm_config_arch: ${{ matrix.node_arch }}
          ARCHFLAGS: ${{ matrix.archflags }}

      - name: Run Unit Tests
        if: matrix.run_tests
        run: npm run test:ci

      - name: Skip Cross-Architecture Runtime Tests
        if: ${{ !matrix.run_tests }}
        run: echo "Built ${{ matrix.target }} on ${{ matrix.os }}; runtime tests are skipped for this cross-architecture target."
