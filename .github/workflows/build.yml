name: Build Binaries
defaults:
  run:
    shell: bash

on:
  workflow_dispatch

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:

      - name: Fetch Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: 'npm'

      - name: Get Package Version
        id: package-version
        run: node -p "'version='+require('./package').version" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.package-version.outputs.version }}
          name: Release ${{ steps.package-version.outputs.version }}

  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-2022
            node_arch: x64
            archflags: ''
          - target: windows-arm64
            os: windows-11-arm
            node_arch: arm64
            archflags: ''
          - target: linux-x64
            os: ubuntu-22.04
            node_arch: x64
            archflags: ''
          - target: linux-arm64
            os: ubuntu-22.04-arm
            node_arch: arm64
            archflags: ''
          - target: darwin-x64
            os: macos-26
            node_arch: x64
            archflags: '-arch x86_64'
          - target: darwin-arm64
            os: macos-26
            node_arch: arm64
            archflags: '-arch arm64'

    runs-on: ${{ matrix.os }}

    steps:

      - name: Fetch Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          architecture: ${{ matrix.node_arch }}
          cache: 'npm'

      - name: Print Native Target
        run: |
          echo "runner=$(uname -s)-$(uname -m)"
          node -p "'node=' + process.version + ' platform=' + process.platform + ' arch=' + process.arch"
          npm config get arch

      - name: Install Modules
        run: npm ci --ignore-scripts

      - name: Build Current Binary
        run: npm run build:rebuild
        env:
          npm_config_arch: ${{ matrix.node_arch }}
          ARCHFLAGS: ${{ matrix.archflags }}

      - name: Get Package Version
        id: package-version
        run: node -p "'version='+require('./package').version" >> $GITHUB_OUTPUT

      - name: Pack Files
        id: pack-files
        run: node -e "import('@node-3d/addon-tools').then((m) => m.actionPack())" >> $GITHUB_OUTPUT

      - name: Attest Binary
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack-files.outputs.pack }}

      - name: Store Binaries
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.package-version.outputs.version }}
          name: Release ${{ steps.package-version.outputs.version }}
          files: ${{ steps.pack-files.outputs.pack }}
